<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxTr App</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px; /* Обмежуємо ширину, як у додатку */
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h1 { font-size: 24px; color: #1f2937; text-align: center; }
        
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.98); } /* Ефект натискання */
        
        #status { margin-top: 15px; font-size: 14px; color: #6b7280; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MaxTr PWA</h1>
        <button id="test-btn">Додати запис</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjtcCiXKKZ9TH3Ubrn65IX59kyCe9C-H4",
            authDomain: "maxtr-c238f.firebaseapp.com",
            projectId: "maxtr-c238f",
            storageBucket: "maxtr-c238f.firebasestorage.app",
            messagingSenderId: "311094677098",
            appId: "1:311094677098:web:7a3797c99fad2874340413",
            measurementId: "G-K7WKH8FX3X"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const statusDiv = document.getElementById('status');

        document.getElementById('test-btn').addEventListener('click', async () => {
            statusDiv.innerText = "Записую...";
            try {
                await addDoc(collection(db, "test_collection"), {
                    message: "Клік з мобільного інтерфейсу!",
                    date: new Date().toLocaleTimeString()
                });
                statusDiv.innerText = "✅ Успішно додано!";
            } catch (e) {
                statusDiv.innerText = "❌ Помилка запису";
            }
        });
    </script>
</body>
</html>
