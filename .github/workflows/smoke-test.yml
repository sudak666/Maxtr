name: Smoke test

# Runs the full tests/*.mjs Playwright/node suite against index.html on
# every push/PR. There is deliberately no root package.json in this repo (see
# CLAUDE.md — plain static HTML/CSS/JS, no build step), so Playwright is
# installed globally in this job rather than as a project dependency,
# matching how it's set up in the maintainer's local/sandbox environment.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root npm dependencies (Vite)
        run: npm ci

      # Vite build + scripts/build-site.mjs — the test suite below runs
      # against source, not dist/, so this is the only CI check that would
      # catch the bundle/site build itself breaking.
      - name: Production build (dist/)
        run: npm run build

      - name: Install Playwright
        run: npm install -g playwright@1.56.1

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Run unit tests
        run: node tests/unit.mjs

      - name: Run transaction validation tests
        run: node tests/tx-validation.mjs

      - name: Run privacy-cache tests
        run: node tests/privacy-cache.mjs

      - name: Run Cloud Function sweep tests
        run: node tests/functions-sweep.mjs

      - name: Run Monobank proxy unit tests
        run: node tests/monobank-proxy.mjs

      - name: Run smoke test
        run: node tests/smoke.mjs

      - name: Run E2E CRUD test
        run: node tests/e2e-crud.mjs

      - name: Run E2E modals test
        run: node tests/e2e-modals.mjs

      - name: Run stress test (large transaction list)
        run: node tests/stress-tx-list.mjs

      - name: Run transaction list targeted-update test
        run: node tests/tx-list-targeted-update.mjs

      - name: Run pull-to-refresh test
        run: node tests/pull-to-refresh.mjs

      - name: Run transaction swipe-to-delete test
        run: node tests/tx-swipe-delete.mjs

      - name: Run debt payment-history reorder + swipe-to-delete test
        run: node tests/debt-swipe-delete.mjs

      - name: Run transaction list sort-order test
        run: node tests/tx-list-sort-order.mjs

      - name: Run bottom-sheet drag-to-dismiss test
        run: node tests/sheet-drag-dismiss.mjs

      - name: Run CSP inline-handler regression test
        run: node tests/csp-handlers.mjs

      - name: Run PWA launch-params test (shortcuts + share_target)
        run: node tests/pwa-launch-params.mjs

      - name: Run CSV import/export round-trip test
        run: node tests/csv-import-export.mjs

      - name: Run on-device AI category suggestion test
        run: node tests/ai-category-suggestion.mjs

      - name: Run shared profiles UI test
        run: node tests/shared-profiles-ui.mjs

      - name: Run shared profile permissions test (editor/viewer roles)
        run: node tests/shared-profile-permissions.mjs

      - name: Run reset profile data test ("start over")
        run: node tests/reset-profile-data.mjs

      - name: Run Monobank connect/sync UI test
        run: node tests/monobank-connect.mjs

      - name: Run hide-amounts privacy toggle test
        run: node tests/hide-amounts.mjs

      - name: Run receipt OCR text-parsing tests
        run: node tests/receipt-ocr-parse.mjs

      - name: Run receipt scan UI test
        run: node tests/receipt-scan-ui.mjs

      - name: Syntax-check Cloud Function
        run: node --check functions/index.js

  dist-smoke:
    runs-on: ubuntu-latest
    # Everything in the `smoke` job above tests source directly (what
    # GitHub Pages serves) — this job separately proves the actual Firebase
    # Hosting artifact (dist/, produced by `npm run build` -> vite build ->
    # scripts/build-site.mjs) still works for real users, not just that it
    # builds without error (the `smoke` job's own `npm run build` step only
    # catches that much). Deliberately a small, targeted subset of the full
    # suite rather than all of it: 3 test files elsewhere in this repo
    # (monobank-connect.mjs, receipt-scan-ui.mjs,
    # shared-profile-permissions.mjs) reach into the live app's module
    # singletons via `page.evaluate(() => import('./js/state.js'))` from
    # page context — a technique that only works when js/*.js files are
    # served individually, not once they're inlined into one bundled
    # output. Rewriting those 3 to use a test-only hook instead is real,
    # separate follow-up work (see CHANGELOG.md's Phase 2 Vite entry) — the
    # 3 tests below don't use that pattern, so they need no such rework to
    # run correctly against dist/.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root npm dependencies (Vite)
        run: npm ci

      - name: Production build (dist/)
        run: npm run build

      - name: Install Playwright
        run: npm install -g playwright@1.56.1

      - name: Install Chromium
        run: playwright install --with-deps chromium

      # Test files compute their own ROOT as the parent of their own
      # directory (see e.g. tests/smoke.mjs), so copying them into
      # dist/tests/ points that resolution at the built site instead of
      # source. firebase.json is copied in too, only for
      # csp-handlers.mjs's own CSP-header lookup — it's never actually
      # served (scripts/build-site.mjs excludes it from every real build,
      # same as firebase.json's own hosting.ignore already did before
      # Phase 2), this is CI-only and dist/ here is never deployed.
      - name: Stage tests against dist/
        run: |
          mkdir -p dist/tests
          cp tests/smoke.mjs tests/e2e-crud.mjs tests/csp-handlers.mjs dist/tests/
          cp firebase.json dist/firebase.json

      - name: Run smoke test against dist/
        working-directory: dist/tests
        run: node smoke.mjs

      - name: Run E2E CRUD test against dist/
        working-directory: dist/tests
        run: node e2e-crud.mjs

      - name: Run CSP handlers test against dist/
        working-directory: dist/tests
        run: node csp-handlers.mjs

  firestore-rules:
    runs-on: ubuntu-latest
    # A separate job, not folded into `smoke` above: needs a JDK + the
    # Firestore emulator (downloads the emulator jar on first use) + two npm
    # packages this repo intentionally doesn't vendor as a root package.json
    # (see CLAUDE.md — no build step for the app itself). This asserts
    # against a real emulator's evaluation of firestore.rules, which
    # tests/smoke.mjs never touches (it stubs the Firebase SDK entirely).
    # Added after a real bug shipped to main and passed every check that
    # existed at the time: firestore.rules denied every deleteDoc() (a
    # `request.resource.data` field access in the same allow block as
    # delete, where request.resource is null on delete) — invisible to a
    # read-through and to smoke.mjs, only visible against the emulator.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install rules-test dependencies
        run: |
          mkdir -p /tmp/rules-test
          cd /tmp/rules-test
          npm init -y >/dev/null
          npm install --no-audit --no-fund @firebase/rules-unit-testing firebase
          ln -s /tmp/rules-test/node_modules "$GITHUB_WORKSPACE/tests/node_modules"

      - name: Start Firestore emulator
        working-directory: /tmp/rules-test
        run: |
          nohup npx --yes firebase-tools emulators:start --only firestore --project rytm-rules-test > emulator.log 2>&1 &
          for i in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/8080) 2>/dev/null && break
            sleep 1
          done
          cat emulator.log

      - name: Run Firestore rules tests
        run: node tests/firestore-rules.mjs
